name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm dlx vercel@latest pull --yes --environment=staging --token=$VERCEL_TOKEN
      - run: pnpm dlx vercel@latest build --target=staging --token=$VERCEL_TOKEN
      - run: pnpm dlx vercel@latest deploy --prebuilt --target=staging --token=$VERCEL_TOKEN
